services:
  # ─── Banco de Dados ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: grupodozap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grupodozap
      POSTGRES_USER: grupodozap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grupodozap_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grupodozap"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grupodozap_net

  # ─── Cache + Filas ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grupodozap_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grupodozap_net

  # ─── API Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grupodozap_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://grupodozap:${POSTGRES_PASSWORD:-grupodozap_secret}@postgres:5432/grupodozap
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - grupodozap_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Worker de Filas (Bull) ───────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: grupodozap_worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://grupodozap:${POSTGRES_PASSWORD:-grupodozap_secret}@postgres:5432/grupodozap
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - grupodozap_net

  # ─── Frontend Next.js ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grupodozap_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - grupodozap_net

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: grupodozap_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - grupodozap_net

volumes:
  postgres_data:
  redis_data:

networks:
  grupodozap_net:
    driver: bridge
